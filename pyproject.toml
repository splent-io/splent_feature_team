[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_team"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Team — people directory (organisers, faculty, speakers); public list/detail + admin CRUD"

[tool.splent.contract.provides]
routes     = ["/admin/team", "/admin/team/<int:member_id>/delete", "/admin/team/<int:member_id>/edit", "/admin/team/new", "/admin/team/roles", "/admin/team/roles/<int:role_id>/delete", "/admin/team/roles/<int:role_id>/edit", "/team", "/team/<slug>"]
blueprints = []
models     = ["Role", "TeamMember"]
commands   = ["hello"]
hooks      = ["layout.authenticated_sidebar"]
services   = ["TeamService"]
signals    = []
translations = ["es"]
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["TeamService"]
templates = ["team/admin/form.html", "team/admin/list.html", "team/admin/roles.html", "team/detail.html", "team/index.html", "team/list.html"]
models    = ["Role", "TeamMember"]
hooks     = ["layout.authenticated_sidebar"]
routes    = false
